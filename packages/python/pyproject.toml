# SPDX-License-Identifier: Apache-2.0
#
# pyproject.toml for MAP Protocol Python SDK
#

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mapprotocol"
version = "2026.5.14"
description = "Official Python SDK for Micro Agent Protocol (MAP)"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [
    { name = "Sidian Labs" }
]
requires-python = ">=3.9"
keywords = ["map", "micro-agent-protocol", "ai", "agents", "delegation"]
dependencies = [
    "httpx>=0.25.0",
]

[project.urls]
Homepage = "https://github.com/SidianLabs/micro-agent-protocol"
Repository = "https://github.com/SidianLabs/micro-agent-protocol.git"
Issues = "https://github.com/SidianLabs/micro-agent-protocol/issues"

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "mypy>=1.6.0",
    "ruff>=0.1.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 88
target-version = "py39"

[tool.mypy]
python_version = "3.9"
strict = true
