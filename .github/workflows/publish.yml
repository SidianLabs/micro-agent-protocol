name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., 1.0.0-beta.1)'
        required: false
        type: string

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'
  GO_VERSION: '1.22'

jobs:
  # ===========================================================================
  # Determine version
  # ===========================================================================
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            DATE=$(date +%Y%m%d)
            TIME=$(date +%H%M%S | head -c4)
            echo "version=0.0.0-$DATE.$TIME" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Publish TypeScript SDK
  # ===========================================================================
  publish-typescript:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    needs: [version]
    environment:
      name: npm
      url: https://www.npmjs.com/package/@sidianlabs/map-client
    defaults:
      run:
        working-directory: packages/typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: packages/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish canary
        run: |
          TAG="${{ needs.version.outputs.version }}"
          npm publish --access public --tag canary 2>&1 || true
          echo "Published @sidianlabs/map-client@$TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Add canary comment
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.createComment({
              issue_number: context.issue.number,
              body: 'TypeScript SDK published as `@sidianlabs/map-client@${{ needs.version.outputs.version }}` (canary)\n\nInstall: `npm install @sidianlabs/map-client@canary`'
            });

  # ===========================================================================
  # Publish Docker image
  # ===========================================================================
  publish-docker:
    name: Publish Docker image to Docker Hub
    runs-on: ubuntu-latest
    needs: [version]
    environment:
      name: docker
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: sidianlabs/map-reference
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Publish GitHub Release (canary)
  # ===========================================================================
  create-release:
    name: Create Canary Release
    runs-on: ubuntu-latest
    needs: [version, publish-docker]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          draft: true
          prerelease: ${{ needs.version.outputs.is_prerelease }}
          name: MAP v${{ needs.version.outputs.version }} (canary)
          body: |
            Canary release from `${{ github.sha }}`

            ## Installation

            ```bash
            npm install @sidianlabs/map-client@canary
            docker pull sidianlabs/map-reference:latest
            ```

  # ===========================================================================
  # Sync git tag for SDK
  # ===========================================================================
  tag-sdk:
    name: Tag TypeScript SDK
    runs-on: ubuntu-latest
    needs: [version, publish-typescript]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create SDK tag
        run: |
          TAG="sdk/typescript/v${{ needs.version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"