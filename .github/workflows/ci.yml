  # ===========================================================================
  # License Headers Check
  # ===========================================================================
  license-check:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Apache 2.0 headers
        run: |
          if grep -rL "SPDX-License-Identifier: Apache-2.0" \
            --exclude-dir=".*" --exclude-dir="node_modules" --exclude-dir="dist" --exclude-dir="coverage" \
            --include="*.ts" \
            --include="*.js" \
            --include="*.tsx" \
            --include="*.jsx" \
            --include="*.py" \
            --include="*.go" \
            --include="*.sh" \
            --include="*.yaml" \
            --include="*.yml" \
            --include="*.md" \
            . ; then
            echo "ERROR: Files missing Apache 2.0 SPDX license header:"
            grep -rL "SPDX-License-Identifier: Apache-2.0" \
              --exclude-dir=".*" --exclude-dir="node_modules" --exclude-dir="dist" --exclude-dir="coverage" \
              --include="*.ts" --include="*.js" --include="*.tsx" --include="*.jsx" \
              --include="*.py" --include="*.go" --include="*.sh" \
              --include="*.yaml" --include="*.yml" --include="*.md" \
              .
            exit 1
          fi

  # ===========================================================================
  # Schema Validation
  # ===========================================================================
  schemas:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Validate JSON Schemas
        run: |
          for schema in schemas/*.schema.json; do
            echo "Validating $schema"
            node -e "JSON.parse(require('fs').readFileSync('$schema'))"
          done

      - name: Check OpenAPI spec exists
        run: |
          if [ ! -f schemas/openapi.yaml ]; then
            echo "ERROR: OpenAPI spec not found at schemas/openapi.yaml"
            exit 1
          fi

  # ===========================================================================
  # Security Audit
  # ===========================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: success()
        with:
          sarif_file: 'trivy-results.sarif'
