name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - '**'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'
  GO_VERSION: '1.22'
  MAP_SIGNING_SECRET: 'map-dev-secret'

jobs:
  # ===========================================================================
  # TypeScript / Node.js
  # ===========================================================================
  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Upload TypeScript build artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-typescript-latest
          path: |
            packages/typescript/dist
            packages/typescript/package.json
            packages/typescript/README.md

  # ===========================================================================
  # Reference Implementation (TypeScript)
  # ===========================================================================
  reference:
    name: Reference Implementation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npm run check

      - name: Build reference
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run conformance suites
        run: npm run conformance:all

      - name: Run lint
        run: npm run lint

      - name: Upload Reference Server build artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-reference-latest
          path: |
            dist
            package.json
            README.md

