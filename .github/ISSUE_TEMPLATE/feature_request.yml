name: Feature Request
description: Suggest a new feature or enhancement for MAP Protocol
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out this form.

        For **protocol changes**, please open a [Discussion](https://github.com/mapprotocol/map/discussions)
        first to gauge community interest before filing an issue.

        For **SDK-specific features**, please select the appropriate SDK component below.

  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: A concise one-line summary of the feature.
      placeholder: e.g., Add support for streaming responses
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: |
        Why is this feature needed? What problem does it solve?
        What use cases does it enable?
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Detailed Description
      description: |
        Describe the feature in detail. Include:
        - API changes (if any)
        - New concepts or terminology
        - Required changes to existing behavior
        - Any potential breaking changes
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of MAP Protocol would this feature affect?
      options:
        - Protocol Specification
        - Reference Implementation
        - TypeScript SDK (@mapprotocol/sdk)
        - Python SDK (@mapprotocol/python)
        - Go SDK (github.com/mapprotocol/go)
        - Documentation
        - OpenAPI Schema
        - Conformance Tests
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: |
        What alternatives have you considered?
        Why did you choose this approach over others?
    validations:
      required: false

  - type: textarea
    id: implementation
    attributes:
      label: Proposed Implementation
      description: |
        If you have thoughts on implementation, describe them here.
        This can include:
        - Algorithm or approach
        - Code snippets
        - File locations
        - Testing strategy
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: Usage Examples
      description: |
        Provide example code or API demonstrating how this feature would be used.
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Impact Assessment
      description: |
        What is the expected impact of this feature?
        - Breaking changes?
        - New dependencies?
        - Migration requirements?
    validations:
      required: false

  - type: checkboxes
    id: willingness
    attributes:
      label: Contribution willingness
      options:
        - label: |
            I am willing to help implement this feature (or would consider
            a pull request if someone else implements it)
          required: false
