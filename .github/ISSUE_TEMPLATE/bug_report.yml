name: Bug Report
description: Report a bug in MAP Protocol
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out this form.

        **Important**: This is for bugs in the MAP Protocol itself (specification,
        reference implementation, or official SDKs). For implementation help with
        your own code, please use [GitHub Discussions](https://github.com/mapprotocol/map/discussions).

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: |
        Describe the bug here. What did you expect to happen? What actually happened?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of MAP Protocol has the bug?
      options:
        - Protocol Specification
        - Reference Implementation
        - TypeScript SDK (@mapprotocol/sdk)
        - Python SDK (@mapprotocol/python)
        - Go SDK (github.com/mapprotocol/go)
        - Documentation
        - OpenAPI Schema
        - Other

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Go to '...'
        2. Execute '...'
        3. See error in '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of MAP Protocol?
      placeholder: e.g., 1.0.0, 0.1.0

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Runtime environment (Node.js 20, Python 3.11, etc.)
      placeholder: e.g., Node.js 20, Python 3.11, Go 1.22

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Paste any relevant log output, error messages, or stack traces.
        (DO NOT include sensitive information like API keys or passwords)

  - type: checkboxes
    id: security
    attributes:
      label: Security Consideration
      options:
        - label: |
            I confirm this bug report does not contain any security-sensitive
            information (API keys, passwords, tokens, etc.)
          required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
