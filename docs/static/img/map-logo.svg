<svg viewBox="0 0 200 200" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    MAP Protocol (Micro Agent Protocol) Logo
    Ultra-modern, fractured 3D origami 'M'
    Flat design with mathematically perfect geometric folds.
  -->
  <g transform="translate(0, 0)">
    
    <!-- LEFT PILLAR -->
    <!-- Outer Left Pillar (Faces Left) -->
    <polygon points="20,160 20,20 40,30 40,170" fill="#3B82F6" />
    <!-- Inner Left Pillar (Faces Right) -->
    <polygon points="40,170 40,30 60,40 60,180" fill="#4338CA" />

    <!-- LEFT DIAGONAL -->
    <!-- Outer Left Diagonal (Faces Top-Left, brightest) -->
    <polygon points="20,20 100,120 100,95 40,30" fill="#FFFFFF" />
    <!-- Inner Left Diagonal (Faces Bottom-Left) -->
    <polygon points="40,30 100,95 100,70 60,40" fill="#60A5FA" />

    <!-- RIGHT DIAGONAL -->
    <!-- Outer Right Diagonal (Faces Bottom-Left) -->
    <polygon points="180,20 100,120 100,95 160,30" fill="#3B82F6" />
    <!-- Inner Right Diagonal (Faces Top-Left, brightly lit) -->
    <polygon points="160,30 100,95 100,70 140,40" fill="#F8FAFC" />

    <!-- RIGHT PILLAR -->
    <!-- Outer Right Pillar (Faces Right) -->
    <polygon points="180,160 180,20 160,30 160,170" fill="#4338CA" />
    <!-- Inner Right Pillar (Faces Bottom-Right, darkest) -->
    <polygon points="160,170 160,30 140,40 140,180" fill="#1E3A8A" />

  </g>
</svg>
